<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Mark Player | المشغل الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { 
            --green-neon: #00F5C4; 
            --main-bg: #042016; 
            --panel-bg: rgba(0, 0, 0, 0.85); 
        }
        
        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            background: #000; 
            font-family: 'Cairo', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            color: white; 
            overflow: hidden; 
        }
        
        .top-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            transition: opacity 0.4s, transform 0.4s;
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        .back-btn-top { 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            padding: 8px 16px; 
            border-radius: 8px; 
            font-weight: bold; 
            text-decoration: none; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(10px); 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            font-size: 0.9rem;
            pointer-events: auto;
        }
        .back-btn-top:hover { background: var(--green-neon); color: #000; }

        .video-title { 
            background: rgba(0,0,0,0.5); 
            padding: 8px 15px; 
            border-radius: 8px; 
            border-right: 4px solid var(--green-neon); 
            font-weight: bold;
            font-size: 0.9rem;
            max-width: 60%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-container { 
            position: relative; 
            width: 100%; 
            max-width: 1200px; 
            margin: auto; 
            aspect-ratio: 16/9; 
            background: #000; 
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0, 245, 196, 0.1); 
        }

        .video-container:fullscreen { max-width: 100%; width: 100%; aspect-ratio: auto; }

        video { width: 100%; height: 100%; object-fit: contain; cursor: pointer; }

        .custom-controls { 
            position: absolute; 
            bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.95)); 
            padding: 20px; 
            transition: opacity 0.4s, transform 0.4s; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            z-index: 10; 
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .show-ui .custom-controls, .show-ui .top-header {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .progress-area { 
            height: 6px; 
            background: rgba(255,255,255,0.2); 
            cursor: pointer; 
            position: relative; 
            border-radius: 10px; 
            transition: height 0.1s;
        }
        .progress-area:hover { height: 8px; }
        .progress-bar { 
            height: 100%; 
            background: var(--green-neon); 
            width: 0%; 
            position: absolute;
            right: 0;
            border-radius: 10px; 
        }

        .buttons-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .left-side, .right-side { display: flex; align-items: center; gap: 15px; }
        
        .control-btn { 
            background: none; border: none; color: white; cursor: pointer; 
            font-size: 1.3rem; transition: 0.2s; padding: 5px; 
            display: flex; align-items: center; justify-content: center;
        }
        .control-btn:hover { color: var(--green-neon); transform: scale(1.1); }

        .time-text { font-size: 0.9rem; font-family: monospace; opacity: 0.9; margin-right: 5px; }

        .settings-menu { 
            position: absolute; 
            bottom: 85px; 
            left: 20px; 
            background: var(--panel-bg); 
            border-radius: 12px; 
            padding: 8px; 
            display: none; 
            border: 1px solid rgba(0, 245, 196, 0.3); 
            backdrop-filter: blur(15px); 
            min-width: 120px;
        }
        .settings-menu.active { display: block; }
        .settings-menu button { 
            display: block; width: 100%; background: none; border: none; 
            color: white; padding: 10px; text-align: center; 
            cursor: pointer; border-radius: 8px; font-family: 'Cairo';
        }
        .settings-menu button:hover { background: var(--green-neon); color: black; }

        @media (max-width: 600px) {
            .video-container { border-radius: 0; }
            .left-side, .right-side { gap: 8px; }
        }
    </style>
</head>
<body class="show-ui">

    <div class="video-container" id="main-container">
        <div class="top-header">
            <a href="javascript:history.back()" class="back-btn-top">
                <i class="fas fa-arrow-right"></i> رجوع
            </a>
            <div class="video-title" id="display-title">جاري تحميل المحاضرة...</div>
        </div>

        <video id="video-player" playsinline></video>

        <div class="custom-controls">
            <div class="progress-area" id="progress-area">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="buttons-row">
                <div class="left-side">
                    <button class="control-btn" id="play-pause"><i class="fas fa-play"></i></button>
                    <button class="control-btn" onclick="skip(-10)"><i class="fas fa-backward"></i></button>
                    <button class="control-btn" onclick="skip(10)"><i class="fas fa-forward"></i></button>
                    <span class="time-text" id="time-display">00:00 / 00:00</span>
                </div>

                <div class="right-side">
                    <button class="control-btn" id="speed-settings"><i class="fas fa-tachometer-alt"></i></button>
                    <button class="control-btn" id="full-screen"><i class="fas fa-expand"></i></button>
                </div>
            </div>

            <div class="settings-menu" id="speed-menu">
                <p style="margin: 5px 0; font-size: 0.7rem; color: var(--green-neon); text-align: center;">السرعة</p>
                <button onclick="setSpeed(0.5)">0.5x</button>
                <button onclick="setSpeed(1)">عادية</button>
                <button onclick="setSpeed(1.5)">1.5x</button>
                <button onclick="setSpeed(2)">2.0x</button>
            </div>
        </div>
    </div>

<script>
    const video = document.getElementById('video-player');
    const playBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const progressArea = document.getElementById('progress-area');
    const timeDisplay = document.getElementById('time-display');
    const speedMenu = document.getElementById('speed-menu');
    const container = document.getElementById('main-container');
    const fullScreenBtn = document.getElementById('full-screen');
    
    let controlsTimeout;

    // ===== استيراد البيانات =====
   // ===== استيراد البيانات =====
const savedSources = JSON.parse(localStorage.getItem('video_sources') || '[]');
const videoTitleFromStorage = localStorage.getItem('video_title') || "المحاضرة";
const resumeTime = parseFloat(localStorage.getItem('resume_time') || '0'); // استرجاع وقت المشاهدة
document.getElementById('display-title').innerText = videoTitleFromStorage;

if(savedSources.length>0){
    const source = savedSources[0];
    const videoUrl = source.stream_url || source.src || source;

    if(Hls.isSupported() && videoUrl.endsWith('.m3u8')){
        const hls = new Hls();
        hls.loadSource(videoUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.currentTime = resumeTime; // ارجع للوقت المحفوظ
            video.play();

            // ✨ Fullscreen تلقائي
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.warn("تعذر فتح الشاشة الكاملة:", err);
                });
            }
        });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src = videoUrl;
        video.addEventListener('loadedmetadata', () => {
            video.currentTime = resumeTime;
            video.play();

            // ✨ Fullscreen تلقائي
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.warn("تعذر فتح الشاشة الكاملة:", err);
                });
            }
        });
    } else {
        video.src = videoUrl;
        video.addEventListener('loadedmetadata', () => {
            video.currentTime = resumeTime;
            video.play();

            // ✨ Fullscreen تلقائي
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.warn("تعذر فتح الشاشة الكاملة:", err);
                });
            }
        });
    }
} else {
    alert("⚠️ لم يتم تحديد رابط الفيديو في localStorage");
}


    // ===== وظيفة اظهار واجهة التحكم =====
    function showUI() {
        document.body.classList.add('show-ui');
        clearTimeout(controlsTimeout);
        if (!video.paused) {
            controlsTimeout = setTimeout(() => document.body.classList.remove('show-ui'), 3000);
        }
    }

    container.addEventListener('mousemove', showUI);
    container.addEventListener('click', (e) => {
        if (e.target.closest('.custom-controls') || e.target.closest('.top-header')) return;
        showUI();
    });

    // ===== تشغيل/إيقاف الفيديو =====
    function togglePlay() {
        if (video.paused) {
            video.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            video.pause();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
        showUI();
    }

    playBtn.addEventListener('click', togglePlay);
    video.addEventListener('click', togglePlay);

    // ===== تنسيق الوقت =====
    function formatTime(time) {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60);
        return `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    // ===== تحديث progress bar وحفظ آخر وقت مشاهدة =====
    video.addEventListener('timeupdate', () => {
        // حفظ وقت المشاهدة كل 5 ثواني
        if(video.currentTime % 5 < 0.2){ 
            localStorage.setItem('resume_time', video.currentTime);
        }

        if (video.duration) {
            const percent = (video.currentTime / video.duration) * 100;

            // Progress bar عرض + تدرج لوني ديناميكي + توهج مزدوج
            progressBar.style.width = `${percent}%`;
            progressBar.style.background = `linear-gradient(to left, #00F5C4, #00BFFF)`; // أخضر → أزرق
            progressBar.style.boxShadow = `0 0 15px rgba(0, 245, 196, ${percent/100}), 0 0 20px rgba(0, 191, 255, ${percent/100})`;

            timeDisplay.innerText = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        }
    });

    // ===== النقر على progress bar للتقديم =====
    progressArea.addEventListener('click', (e) => {
        const rect = progressArea.getBoundingClientRect();
        const x = rect.right - e.clientX; 
        const width = rect.width;
        video.currentTime = (x / width) * video.duration;
        showUI();
    });

    // ===== تخطي للأمام والخلف =====
    window.skip = (val) => { video.currentTime += val; showUI(); };

    // ===== إعدادات السرعة =====
    document.getElementById('speed-settings').addEventListener('click', (e) => {
        e.stopPropagation();
        speedMenu.classList.toggle('active');
    });

    window.setSpeed = (speed) => {
        video.playbackRate = speed;
        speedMenu.classList.remove('active');
        showUI();
    };

    document.addEventListener('click', () => speedMenu.classList.remove('active'));

    // ===== تكبير/تصغير الشاشة =====
    function toggleFullScreen() {
        if (!document.fullscreenElement) container.requestFullscreen();
        else document.exitFullscreen();
    }

    fullScreenBtn.addEventListener('click', toggleFullScreen);

    document.addEventListener('fullscreenchange', () => {
        fullScreenBtn.innerHTML = document.fullscreenElement ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
    });

    // ===== اختصارات لوحة المفاتيح =====
    document.addEventListener('keydown', (e) => {
        showUI();
        if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
        if(e.code==='ArrowRight') skip(10);
        if(e.code==='ArrowLeft') skip(-10);
        if(e.code==='KeyF') toggleFullScreen();
    });
</script>

</body>
</html>
