
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>حسابي - منصة THE BEST</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0a0f1a, #020408);
      padding: 20px;
      min-height: 100vh;
      transition: background 0.3s;
    }
    body.light-mode { background: #f0f4fa; }
    .container { max-width: 500px; margin: 0 auto; }
    .glass-card {
      background: rgba(20, 28, 36, 0.75);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,215,0,0.3);
    }
    body.light-mode .glass-card { background: rgba(255,255,255,0.9); }
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    .back-btn {
      background: rgba(255,215,0,0.15);
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      color: #ffd966;
      cursor: pointer;
    }
    h1 { color: #ffd966; font-size: 1.6rem; flex: 1; }
    .avatar {
      width: 80px;
      height: 80px;
      background: #ffd96620;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin-bottom: 10px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 15px;
      margin: 20px 0;
    }
    .stat-card {
      background: rgba(0,0,0,0.3);
      border-radius: 24px;
      padding: 15px;
      text-align: center;
    }
    body.light-mode .stat-card { background: #e2e8f0; }
    .stat-value { font-size: 2rem; font-weight: 900; color: #ffd966; }
    .logout-btn {
      width: 100%;
      padding: 14px;
      background: #ef4444;
      border: none;
      border-radius: 60px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2a32ee;
      backdrop-filter: blur(16px);
      padding: 10px 24px;
      border-radius: 60px;
      color: #ffec9f;
      z-index: 9999;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <div class="header">
      <button class="back-btn" onclick="window.location.href='subjects-e.html'">⬅️ رجوع</button>
      <h1>حسابي</h1>
      <i class="fas fa-user-circle" style="font-size: 2rem; color:#ffd966;"></i>
    </div>
    <div style="text-align:center;">
      <div class="avatar" id="avatar">👤</div>
      <h2 id="studentName">...</h2>
      <p id="studentGrade">📚 ...</p>
      <p id="studentPhone">📱 ...</p>
    </div>
  </div>

  <div class="glass-card">
    <h3><i class="fas fa-chart-line"></i> إحصائياتي</h3>
    <div class="stat-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-value" id="videosWatched">0</div><div>فيديو مكتمل</div></div>
      <div class="stat-card"><div class="stat-value" id="examsDone">0</div><div>امتحان مكتمل</div></div>
      <div class="stat-card"><div class="stat-value" id="avgScore">0%</div><div>المعدل</div></div>
      <div class="stat-card"><div class="stat-value" id="level">🌟</div><div>المستوى</div></div>
    </div>
  </div>

  <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
    authDomain: "date-student.firebaseapp.com",
    databaseURL: "https://date-student-default-rtdb.firebaseio.com",
    projectId: "date-student",
    storageBucket: "date-student.firebasestorage.app",
    messagingSenderId: "952213529741",
    appId: "1:952213529741:web:7a8d8da275214b5754eec4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const student = JSON.parse(localStorage.getItem('currentStudent'));
  if (!student) window.location.href = 'index.html';

  document.getElementById('studentName').innerText = student.studentName || 'طالب';
  document.getElementById('studentGrade').innerHTML = `📚 ${student.grade || 'غير محدد'}`;
  document.getElementById('studentPhone').innerHTML = `📱 ${student.phone || 'غير محدد'}`;

  const studentCode = localStorage.getItem('studentCode');

  async function loadStats() {
    try {
      const progressSnap = await db.ref(`progress/${studentCode}`).once('value');
      const progress = progressSnap.val() || { lectures: {}, exams: {} };
      let totalVideosCompleted = 0;
      let totalExamsCompleted = 0;
      let totalScores = 0;
      let examCount = 0;

      if (progress.lectures) {
        for (let lecId in progress.lectures) {
          if (progress.lectures[lecId].videos) {
            for (let vid in progress.lectures[lecId].videos) {
              if (progress.lectures[lecId].videos[vid].completed) totalVideosCompleted++;
            }
          }
        }
      }
      if (progress.exams) {
        for (let examId in progress.exams) {
          if (progress.exams[examId].score !== undefined) {
            totalExamsCompleted++;
            totalScores += (progress.exams[examId].score / progress.exams[examId].total) * 100;
            examCount++;
          }
        }
      }
      const avg = examCount ? Math.round(totalScores / examCount) : 0;
      document.getElementById('videosWatched').innerText = totalVideosCompleted;
      document.getElementById('examsDone').innerText = totalExamsCompleted;
      document.getElementById('avgScore').innerText = avg + '%';
      let levelIcon = '🌟';
      if (avg >= 85) levelIcon = '🏆';
      else if (avg >= 70) levelIcon = '📘';
      else if (avg >= 50) levelIcon = '📚';
      else levelIcon = '🎯';
      document.getElementById('level').innerHTML = levelIcon;
    } catch(e) { console.error(e); }
  }
  loadStats();

  document.getElementById('logoutBtn').onclick = () => {
    localStorage.clear();
    window.location.href = 'index.html';
  };

  // الوضع الليلي
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
</script>
</body>
</html>
