<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>الأبواب - منصة THE BEST</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: radial-gradient(circle at 10% 30%, #0a0f1a, #020408);
    color: #f0f3f8;
    padding: 80px 20px 40px;
    transition: background 0.3s, color 0.2s;
    min-height: 100vh;
  }

  /* الوضع الفاتح */
  body.light-mode {
    background: #fafbfd;
    color: #1e2a3a;
  }
  body.light-mode .glass-topbar {
    background: rgba(255, 248, 225, 0.9);
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  body.light-mode .chapter-card {
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.05);
  }
  body.light-mode .chapter-name {
    color: #b85c00;
  }

  /* الشريط العلوي الزجاجي */
  .glass-topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: rgba(10, 20, 28, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,215,0,0.25);
    z-index: 1000;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
  }

  .back-btn {
    background: rgba(255,215,0,0.12);
    border: 1px solid #ffd966;
    color: #ffd966;
    padding: 6px 18px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    font-size: 0.9rem;
  }
  .back-btn:hover {
    background: #ffd966;
    color: #000;
    transform: translateX(-4px);
  }

  .page-title {
    font-size: 1.4rem;
    font-weight: 900;
    background: linear-gradient(135deg, #FFE6B0, #FFB347);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .icons-group {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .icon-circle {
    width: 38px;
    height: 38px;
    background: rgba(255,240,180,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    backdrop-filter: blur(4px);
  }
  .icon-circle:hover {
    background: #ffd966;
    transform: scale(1.05);
  }
  .icon-circle i {
    font-size: 1.2rem;
    color: #ffecb3;
  }
  body.light-mode .icon-circle i {
    color: #b85c00;
  }

  /* زر التبديل الليلي */
  .toggle-switch {
    width: 48px;
    height: 24px;
    background: #555;
    border-radius: 30px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
  }
  .toggle-switch.active {
    background: #ffd966;
  }
  .toggle-switch::after {
    content: "🌙";
    position: absolute;
    top: 2px;
    right: 4px;
    width: 20px;
    height: 20px;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
  }
  .toggle-switch.active::after {
    content: "☀️";
    right: 24px;
  }

  /* العنوان الرئيسي */
  h1 {
    font-size: 2.5rem;
    text-align: center;
    margin: 20px 0 40px;
    font-weight: 900;
    background: linear-gradient(145deg, #FFE6B0, #FFAA33);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* شبكة الأبواب */
  .chapters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 28px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* بطاقة الباب */
  .chapter-card {
    background: rgba(20, 28, 36, 0.75);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 30px 20px;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border: 1px solid rgba(255,215,0,0.3);
    cursor: pointer;
    text-align: center;
    box-shadow: 0 14px 28px rgba(0,0,0,0.4);
  }
  .chapter-card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: #ffd966;
    box-shadow: 0 24px 40px rgba(255,215,0,0.25);
  }

  .chapter-icon {
    font-size: 3rem;
    margin-bottom: 15px;
    color: #ffd966;
  }

  .chapter-name {
    font-size: 1.5rem;
    font-weight: 800;
    color: #ffdfa5;
    margin-bottom: 10px;
  }

  .lecture-count {
    background: rgba(255,215,0,0.15);
    display: inline-block;
    padding: 6px 16px;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: bold;
    color: #ffd966;
    margin-top: 8px;
  }

  /* Skeleton loader */
  .skeleton-card {
    background: linear-gradient(90deg, #2a2f36 25%, #3a414b 50%, #2a2f36 75%);
    background-size: 200% 100%;
    animation: loading 1.4s infinite;
    border-radius: 32px;
    height: 200px;
  }
  @keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* رسائل الخطأ */
  .error-message {
    text-align: center;
    grid-column: 1 / -1;
    background: rgba(255,70,70,0.2);
    padding: 20px;
    border-radius: 60px;
    color: #ffb3b3;
    border: 1px solid #ff8888;
  }

  /* توست الإشعارات */
  .toast-message {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e2a32ee;
    backdrop-filter: blur(16px);
    padding: 12px 28px;
    border-radius: 60px;
    color: #ffec9f;
    font-weight: bold;
    z-index: 9999;
    border-right: 5px solid #ffd966;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; bottom: 0; }
    to { opacity: 1; bottom: 30px; }
  }

  /* زر البروفايل العائم */
  .profile-fab {
    position: fixed;
    bottom: 25px;
    left: 25px;
    background: #11161e;
    width: 55px;
    height: 55px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 16px rgba(0,0,0,0.5);
    cursor: pointer;
    border: 2px solid #ffd966;
    z-index: 1100;
    transition: 0.2s;
  }
  .profile-fab:hover {
    transform: scale(1.08);
    background: #ffd966;
  }
  .profile-fab img {
    width: 30px;
  }
  body.light-mode .profile-fab {
    background: white;
  }

  @media (max-width: 640px) {
    .chapters-grid { gap: 20px; }
    .chapter-name { font-size: 1.2rem; }
    .glass-topbar { padding: 10px 16px; }
    .page-title { font-size: 1rem; }
    h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="glass-topbar">
  <button class="back-btn" id="backBtn">⬅️ رجوع</button>
  <div class="page-title"><i class="fas fa-folder-open"></i> 𝑪𝒉𝒂𝒑𝒕𝒆𝒓𝒔 & 𝑪𝒂𝒎𝒑𝒔</div>
  <div class="icons-group">
    <div class="toggle-switch" id="darkToggle"></div>
    <div class="icon-circle" id="shareBtn"><i class="fas fa-share-alt"></i></div>
    <div class="icon-circle" id="whatsappBtn"><i class="fab fa-whatsapp"></i></div>
    <div class="icon-circle" id="notifyBtn"><i class="far fa-bell"></i></div>
  </div>
</div>

<h1>📚 الأبواب الدراسية</h1>
<div id="chaptersContainer" class="chapters-grid">
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
</div>

<a href="profile.html" class="profile-fab" id="profileFab">
  <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="بروفايل">
</a>

<!-- Firebase SDK (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  // ========== Firebase Config ==========
  const firebaseConfig = {
    apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
    authDomain: "date-student.firebaseapp.com",
    databaseURL: "https://date-student-default-rtdb.firebaseio.com",
    projectId: "date-student",
    storageBucket: "date-student.firebasestorage.app",
    messagingSenderId: "952213529741",
    appId: "1:952213529741:web:7a8d8da275214b5754eec4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ========== عناصر الصفحة ==========
  const chaptersContainer = document.getElementById("chaptersContainer");
  const backBtn = document.getElementById("backBtn");

  // جلب البيانات من localStorage
  const selectedYear = JSON.parse(localStorage.getItem("selected_year"));
  const selectedSubject = JSON.parse(localStorage.getItem("selected_subject"));
  const selectedTeacher = JSON.parse(localStorage.getItem("selected_teacher"));

  // زر العودة
  backBtn.onclick = () => window.location.href = "teachers-e.html";

  // دالة عرض التوست
  function showToast(msg, isError = false) {
    const toast = document.createElement("div");
    toast.className = "toast-message";
    toast.innerHTML = isError ? `⚠️ ${msg}` : `✨ ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  // تحميل الفصول من Firebase
  async function loadChapters() {
    if (!selectedYear || !selectedSubject || !selectedTeacher) {
      chaptersContainer.innerHTML = `<div class="error-message">⚠️ البيانات المطلوبة غير مكتملة (السنة، المادة، المدرس)</div>`;
      return;
    }

    try {
      const path = `years/${selectedYear.id}/subjects/${selectedSubject.id}/teachers/${selectedTeacher.id}/chapters`;
      const snapshot = await db.ref(path).once('value');
      const chaptersData = snapshot.val();

      if (!chaptersData) {
        chaptersContainer.innerHTML = `<div class="error-message">📭 لا توجد أبواب لهذا المدرس بعد.</div>`;
        return;
      }

      chaptersContainer.innerHTML = "";

      // تحويل الكائن إلى مصفوفة
      const chaptersArray = Object.entries(chaptersData).map(([id, chapter]) => ({ id, ...chapter }));

      for (const chapter of chaptersArray) {
        // حساب عدد المحاضرات داخل الباب (إن وجدت)
        let lecturesCount = 0;
        if (chapter.lectures) {
          lecturesCount = Object.keys(chapter.lectures).length;
        }

        const card = document.createElement("div");
        card.className = "chapter-card";
        card.innerHTML = `
          <div class="chapter-icon"><i class="fas fa-book"></i></div>
          <div class="chapter-name">${chapter.name}</div>
          <div class="lecture-count">
            <i class="fas fa-video"></i> ${lecturesCount} ${lecturesCount === 1 ? 'محاضرة' : 'محاضرات'}
          </div>
        `;

        card.addEventListener("click", () => {
          localStorage.setItem("selected_chapter", JSON.stringify({ id: chapter.id, name: chapter.name }));
          window.location.href = "lecture_name.html";
        });

        chaptersContainer.appendChild(card);
      }
    } catch (error) {
      console.error(error);
      chaptersContainer.innerHTML = `<div class="error-message">❌ حدث خطأ في الاتصال بقاعدة البيانات</div>`;
      showToast("فشل تحميل الأبواب", true);
    }
  }

  loadChapters();

  // ========== الوضع الليلي والفاتح ==========
  const darkToggle = document.getElementById("darkToggle");
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light-mode");
    darkToggle.classList.add("active");
  }
  darkToggle.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");
    const isLight = document.body.classList.contains("light-mode");
    localStorage.setItem("theme", isLight ? "light" : "dark");
    darkToggle.classList.toggle("active", isLight);
  });

  // ========== مشاركة وواتساب وإشعارات ==========
  const shareBtn = document.getElementById("shareBtn");
  const whatsappBtn = document.getElementById("whatsappBtn");
  const notifyBtn = document.getElementById("notifyBtn");

  shareBtn.addEventListener("click", () => {
    if (navigator.share) {
      navigator.share({ title: "منصة THE BEST", text: "استعرض الأبواب الدراسية", url: location.href });
    } else {
      showToast("المشاركة غير مدعومة في هذا المتصفح", true);
    }
  });

  whatsappBtn.addEventListener("click", () => {
    window.open(`https://wa.me/?text=${encodeURIComponent(location.href)}`, "_blank");
  });

  notifyBtn.addEventListener("click", () => {
    showToast("🔔 سيتم تفعيل الإشعارات قريباً");
  });
</script>
</body>
</html>
