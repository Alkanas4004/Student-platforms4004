<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>تسجيل الدخول - منصة THE BEST</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0a0f1a, #020408);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s;
    }
    body.light-mode {
      background: radial-gradient(circle at 10% 30%, #f0f4fa, #e2e8f0);
    }
    .glass-card {
      max-width: 450px;
      width: 100%;
      background: rgba(20, 28, 36, 0.75);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 40px 28px;
      border: 1px solid rgba(255,215,0,0.3);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      text-align: center;
    }
    body.light-mode .glass-card {
      background: rgba(255, 255, 255, 0.85);
    }
    .logo-icon { font-size: 5rem; margin-bottom: 10px; }
    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #FFE6B0, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle { color: #a0aec0; margin-bottom: 32px; }
    .code-wrapper {
      background: rgba(0,0,0,0.3);
      border-radius: 60px;
      display: flex;
      align-items: center;
      border: 1px solid #ffd966;
      margin-bottom: 24px;
    }
    .code-icon { font-size: 1.8rem; padding: 0 16px; color: #ffd966; }
    #code-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 18px 10px;
      font-size: 1.4rem;
      text-align: center;
      letter-spacing: 4px;
      font-weight: bold;
      outline: none;
      color: #ffecb3;
      font-family: monospace;
    }
    body.light-mode #code-input { color: #1e2a3a; }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ffd966, #ffb347);
      border: none;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.3s;
    }
    .login-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .error-message {
      background: rgba(239,68,68,0.2);
      color: #fecaca;
      padding: 12px;
      border-radius: 30px;
      margin-top: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2a32ee;
      backdrop-filter: blur(16px);
      padding: 10px 24px;
      border-radius: 60px;
      color: #ffec9f;
      z-index: 9999;
      animation: fadeUp 0.3s;
    }
    @keyframes fadeUp {
      from { opacity: 0; bottom: 0; }
      to { opacity: 1; bottom: 30px; }
    }
    .toggle-dark {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 48px;
      height: 24px;
      background: #555;
      border-radius: 30px;
      cursor: pointer;
    }
    .toggle-dark.active { background: #ffd966; }
    .toggle-dark::after {
      content: "🌙";
      position: absolute;
      top: 2px;
      right: 4px;
      width: 20px;
      height: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    .toggle-dark.active::after { content: "☀️"; right: 24px; }
  </style>
</head>
<body>
<div class="toggle-dark" id="darkToggle"></div>
<div class="glass-card">
  <div class="logo-icon">🎓</div>
  <h1>منصة THE BEST</h1>
  <p class="subtitle">أدخل كود الدخول الخاص بك</p>
  <div class="code-wrapper">
    <span class="code-icon">🔑</span>
    <input type="text" id="code-input" placeholder="كود المدرس أو الطالب" maxlength="20" autocomplete="off">
  </div>
  <button class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> دخول</button>
  <div id="errorMsg" class="error-message"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
    authDomain: "date-student.firebaseapp.com",
    databaseURL: "https://date-student-default-rtdb.firebaseio.com",
    projectId: "date-student",
    storageBucket: "date-student.firebasestorage.app",
    messagingSenderId: "952213529741",
    appId: "1:952213529741:web:7a8d8da275214b5754eec4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const codeInput = document.getElementById('code-input');
  const loginBtn = document.getElementById('loginBtn');
  const errorDiv = document.getElementById('errorMsg');

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  async function handleLogin() {
    const code = codeInput.value.trim().toUpperCase();
    if (!code) {
      errorDiv.innerText = 'الرجاء إدخال الكود';
      errorDiv.style.display = 'block';
      return;
    }
    errorDiv.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التحقق...';

    try {
      // 1. البحث في مسار الطلاب (codes)
      let studentSnap = await db.ref(`codes/${code}`).once('value');
      let userData = studentSnap.val();
      let userType = 'student';
      let userId = code;
      let yearId = userData?.yearId;
      let subjectIds = userData?.subjectIds || [];

      // 2. إذا لم يوجد في codes، نبحث في teachers باستخدام حقل password
      if (!userData) {
        const teachersSnap = await db.ref('teachers').once('value');
        let foundTeacher = null;
        teachersSnap.forEach(child => {
          if (child.val().password === code) {
            foundTeacher = { id: child.key, ...child.val() };
          }
        });
        if (foundTeacher) {
          userData = foundTeacher;
          userType = 'teacher';
          userId = foundTeacher.phone;
          yearId = foundTeacher.yearId || 'year_2026';
          subjectIds = foundTeacher.subjectIds || [];
        }
      }

      if (!userData) {
        showToast('❌ كود غير صالح');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
        return;
      }

      // تخزين جلسة الدخول
      const session = {
        code: code,
        userType: userType,
        userId: userId,
        name: userData.name || userData.studentName,
        phone: userData.phone,
        grade: userData.grade,
        subscription: userData.subscription || 'active',
        expiryDate: userData.expiryDate,
        yearId: yearId,
        subjectIds: subjectIds,
        teacherIds: userData.teacherIds || []
      };
      localStorage.setItem('currentUser', JSON.stringify(session));
      localStorage.setItem('userCode', code);
      localStorage.setItem('userType', userType);
      
      showToast(`✅ مرحباً ${session.name}`);
      setTimeout(() => {
        window.location.href = 'subjects-e.html';
      }, 1000);
    } catch (err) {
      console.error(err);
      showToast('❌ خطأ في الاتصال بقاعدة البيانات');
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
    }
  }

  loginBtn.addEventListener('click', handleLogin);
  codeInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });

  // الوضع الليلي
  const darkToggle = document.getElementById('darkToggle');
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light-mode');
    darkToggle.classList.add('active');
  }
  darkToggle.addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    darkToggle.classList.toggle('active', isLight);
  });
</script>
</body>
</html>
