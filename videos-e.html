<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>الفيديوهات والامتحانات - منصة THE BEST</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: radial-gradient(circle at 10% 20%, #0a0f1a, #03060c);
    color: #eef5ff;
    margin: 0;
    padding: 20px;
    transition: background 0.3s, color 0.2s;
    min-height: 100vh;
  }

  /* الوضع الفاتح */
  body.light-mode {
    background: #f0f4fa;
    color: #1a2a3a;
  }
  body.light-mode .glass-panel,
  body.light-mode .video-box,
  body.light-mode .exam-box {
    background: rgba(255, 255, 255, 0.92);
    box-shadow: 0 15px 35px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.08);
  }
  body.light-mode .topbar {
    background: rgba(255,255,240,0.95);
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }
  body.light-mode .video-title,
  body.light-mode .exam-title,
  body.light-mode h1, body.light-mode h2 {
    color: #c96f00;
  }

  /* الشريط العلوي */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: rgba(10, 20, 28, 0.85);
    backdrop-filter: blur(16px);
    border-radius: 60px;
    margin-bottom: 30px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,215,0,0.2);
  }

  .back-btn {
    background: rgba(255,215,0,0.12);
    border: 1.5px solid #ffd966;
    color: #ffd966;
    padding: 8px 18px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    font-size: 0.9rem;
  }
  .back-btn:hover {
    background: #ffd966;
    color: #000;
    transform: translateX(-4px);
  }

  .page-title {
    font-size: 1.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #FFE6B0, #FFB347);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
  }

  .icons-bar {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .icon-btn {
    background: rgba(255,255,240,0.1);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    backdrop-filter: blur(4px);
  }
  .icon-btn:hover {
    background: #ffd966;
    transform: scale(1.05);
  }
  .icon-btn img {
    width: 20px;
    filter: invert(1);
  }
  body.light-mode .icon-btn img {
    filter: invert(0);
  }

  /* زر التبديل الليلي */
  .toggle-dark {
    width: 44px;
    height: 24px;
    background: #ccc;
    border-radius: 30px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
  }
  .toggle-dark.active {
    background: #ffd966;
  }
  .toggle-dark::after {
    content: "🌙";
    position: absolute;
    top: 2px;
    left: 4px;
    width: 20px;
    height: 20px;
    transition: 0.3s;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .toggle-dark.active::after {
    content: "☀️";
    left: 20px;
  }

  /* العناوين */
  h1 {
    font-size: 2rem;
    text-align: center;
    margin: 20px 0;
  }
  h2 {
    font-size: 1.8rem;
    margin: 40px 0 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-right: 5px solid #ffd966;
    padding-right: 18px;
  }

  /* الحاويات */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
    margin-top: 10px;
  }

  /* بطاقة الفيديو */
  .video-card {
    background: rgba(20, 30, 40, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 28px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border: 1px solid rgba(255,215,0,0.25);
    cursor: pointer;
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
  }
  .video-card:hover {
    transform: translateY(-8px) scale(1.01);
    border-color: #ffd966;
    box-shadow: 0 25px 35px -12px rgba(255,215,0,0.3);
  }
  .thumb-wrapper {
    position: relative;
    background: #000000aa;
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
    background-size: cover;
    background-position: center;
  }
  .play-icon {
    font-size: 58px;
    color: #ffd966;
    filter: drop-shadow(0 0 12px gold);
    transition: 0.2s;
  }
  .video-card:hover .play-icon {
    transform: scale(1.1);
    color: #fff2b5;
  }
  .watched-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #00b894cc;
    backdrop-filter: blur(8px);
    border-radius: 30px;
    padding: 4px 12px;
    font-size: 0.7rem;
    font-weight: bold;
    color: white;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .video-info {
    padding: 16px;
  }
  .video-title {
    font-weight: 800;
    font-size: 1.2rem;
    color: #ffecb3;
    margin-bottom: 8px;
  }
  .video-meta {
    font-size: 0.75rem;
    opacity: 0.7;
    display: flex;
    justify-content: space-between;
  }

  /* بطاقة الامتحان */
  .exam-card {
    background: linear-gradient(145deg, #1e2a32, #0f1920);
    border-radius: 32px;
    padding: 20px;
    position: relative;
    border: 1px solid rgba(0,230,118,0.4);
    transition: 0.25s;
  }
  .exam-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 30px -12px rgba(0,230,118,0.2);
  }
  .exam-duration {
    position: absolute;
    top: 16px;
    left: 20px;
    background: #00e67622;
    color: #a3ffcf;
    border-radius: 40px;
    padding: 4px 14px;
    font-size: 0.75rem;
    font-weight: bold;
    border: 1px solid #00e67666;
  }
  .exam-title {
    font-size: 1.3rem;
    font-weight: 900;
    margin: 30px 0 20px;
    color: #fdffb9;
  }
  .start-exam-btn {
    background: rgba(255,215,0,0.2);
    border: 1.5px solid #ffd966;
    color: #ffd966;
    padding: 12px;
    width: 100%;
    border-radius: 40px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
  }
  .start-exam-btn:hover {
    background: #ffd966;
    color: #000;
    letter-spacing: 1px;
  }

  /* تحميل ورسائل */
  .skeleton {
    background: linear-gradient(90deg, #2a2f36 25%, #3f444e 50%, #2a2f36 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
    border-radius: 24px;
    height: 240px;
  }
  @keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  footer {
    text-align: center;
    margin-top: 70px;
    padding: 20px;
    opacity: 0.7;
    font-size: 0.8rem;
  }

  /* زر البروفايل العائم */
  .profile-fab {
    position: fixed;
    bottom: 25px;
    left: 25px;
    background: #1e2f3c;
    width: 55px;
    height: 55px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    cursor: pointer;
    border: 2px solid #ffd966;
    z-index: 1100;
    transition: 0.2s;
  }
  .profile-fab:hover {
    transform: scale(1.08);
    background: #ffd966;
  }
  .profile-fab img {
    width: 30px;
  }

  /* توست */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a2a2fdd;
    backdrop-filter: blur(12px);
    padding: 12px 28px;
    border-radius: 60px;
    color: #ffec9f;
    font-weight: bold;
    z-index: 9999;
    animation: fadeInUp 0.3s;
    border-right: 4px solid gold;
  }
  @keyframes fadeInUp {
    from { opacity: 0; bottom: 0; }
    to { opacity: 1; bottom: 30px; }
  }

  @media (max-width: 560px) {
    body { padding: 12px; }
    .page-title { font-size: 1.2rem; }
    .back-btn { padding: 4px 12px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backBtn">⬅️ رجوع</button>
  <div class="page-title">🎥 𝑽𝒊𝒅𝒆𝒐𝒔 & 𝑬𝒙𝒂𝒎𝒔</div>
  <div class="icons-bar">
    <div class="toggle-dark" id="darkToggle"></div>
    <div class="icon-btn" id="whatsappShare"><i class="fab fa-whatsapp" style="color:#25D366;"></i></div>
    <div class="icon-btn" id="shareBtn"><i class="fas fa-share-alt"></i></div>
    <div class="icon-btn" id="notifyBtn"><i class="far fa-bell"></i></div>
  </div>
</div>

<main>
  <h2><i class="fas fa-video"></i> الفيديوهات التعليمية</h2>
  <div id="videosContainer" class="grid"></div>

  <h2 style="margin-top: 50px;"><i class="fas fa-file-alt"></i> الامتحانات المتاحة</h2>
  <div id="examsContainer" class="grid"></div>
</main>

<footer>
  © 2026 منصة THE BEST – تطوير متواصل 🚀
</footer>

<a href="profile.html" class="profile-fab" id="profileFab">
  <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="profile">
</a>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, child, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
    authDomain: "date-student.firebaseapp.com",
    databaseURL: "https://date-student-default-rtdb.firebaseio.com",
    projectId: "date-student",
    storageBucket: "date-student.firebasestorage.app",
    messagingSenderId: "952213529741",
    appId: "1:952213529741:web:7a8d8da275214b5754eec4"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ===== بيانات المستخدم والجلسة =====
  const selectedYear = JSON.parse(localStorage.getItem("selected_year"));
  const selectedSubject = JSON.parse(localStorage.getItem("selected_subject"));
  const selectedTeacher = JSON.parse(localStorage.getItem("selected_teacher"));
  const selectedChapter = JSON.parse(localStorage.getItem("selected_chapter"));
  const selectedLecture = JSON.parse(localStorage.getItem("selected_lecture"));

  // Device ID لحفظ التقدم
  let userId = localStorage.getItem("deviceUserId");
  if (!userId) {
    userId = "user_" + Math.random().toString(36).substring(2, 10);
    localStorage.setItem("deviceUserId", userId);
  }

  const videosContainer = document.getElementById("videosContainer");
  const examsContainer = document.getElementById("examsContainer");
  const backBtn = document.getElementById("backBtn");
  backBtn.onclick = () => window.location.href = "lecture_name-e.html";

  // ===== دوال مساعدة =====
  function showMessage(msg, isError = false) {
    const toastDiv = document.createElement("div");
    toastDiv.className = "toast";
    toastDiv.innerHTML = isError ? `⚠️ ${msg}` : `✅ ${msg}`;
    document.body.appendChild(toastDiv);
    setTimeout(() => toastDiv.remove(), 3500);
  }

  // جلب تقدم الفيديو من Firebase
  async function getVideoProgress(videoId) {
    try {
      const progressRef = ref(db, `progress/${userId}/lectures/${selectedLecture.id}/videos/${videoId}/lastTime`);
      const snapshot = await get(progressRef);
      return snapshot.val() || 0;
    } catch(e) { return 0; }
  }

  // تحميل الفيديوهات من Firebase
  async function loadVideos() {
    if (!selectedLecture) {
      videosContainer.innerHTML = `<div class="skeleton" style="height:200px;"></div>`;
      return;
    }
    try {
      const path = `years/${selectedYear.id}/subjects/${selectedSubject.id}/teachers/${selectedTeacher.id}/chapters/${selectedChapter.id}/lectures/${selectedLecture.id}/videos`;
      const snapshot = await get(child(ref(db), path));
      const videos = snapshot.val();
      if (!videos) {
        videosContainer.innerHTML = `<div style="text-align:center;grid-column:1/-1;">📭 لا توجد فيديوهات لهذه المحاضرة</div>`;
        return;
      }

      videosContainer.innerHTML = "";
      const videoEntries = Object.entries(videos);

      for (let [vidId, video] of videoEntries) {
        const lastTime = await getVideoProgress(vidId);
        const isWatched = lastTime > 10; // إذا شاهد أكثر من 10 ثوانٍ تظهر علامة "متابعة"

        const card = document.createElement("div");
        card.className = "video-card";
        card.innerHTML = `
          <div class="thumb-wrapper">
            <i class="fas fa-play-circle play-icon"></i>
            ${isWatched ? `<div class="watched-badge"><i class="fas fa-clock"></i> متابعة</div>` : ''}
          </div>
          <div class="video-info">
            <div class="video-title">${video.title || 'فيديو بدون عنوان'}</div>
            <div class="video-meta">
              <span>📹 ${video.duration ? video.duration : 'متغير'}</span>
              <span>🔘 ${lastTime > 0 ? 'تم المشاهدة جزئياً' : 'غير مشاهد'}</span>
            </div>
          </div>
        `;

        card.addEventListener("click", () => {
          if (!video.stream_url) {
            showMessage("رابط الفيديو غير متوفر حالياً", true);
            return;
          }
          localStorage.setItem("video_sources", JSON.stringify([{ src: video.stream_url, type: "application/x-mpegURL" }]));
          localStorage.setItem("video_title", video.title || `محاضرة ${selectedLecture.name}`);
          localStorage.setItem("current_video_id", vidId);
          localStorage.setItem("current_lecture_id", selectedLecture.id);
          window.location.href = "player.html";
        });
        videosContainer.appendChild(card);
      }
    } catch (err) {
      console.error(err);
      showMessage("فشل تحميل الفيديوهات", true);
    }
  }

  // تحميل الامتحانات من Firebase (نفس المسار logic)
  async function loadExams() {
    if (!selectedLecture) return;
    try {
      const path = `years/${selectedYear.id}/subjects/${selectedSubject.id}/teachers/${selectedTeacher.id}/chapters/${selectedChapter.id}/lectures/${selectedLecture.id}/exams`;
      const snapshot = await get(child(ref(db), path));
      const exams = snapshot.val();
      if (!exams) {
        examsContainer.innerHTML = `<div style="text-align:center;grid-column:1/-1;">📌 لا توجد امتحانات لهذه المحاضرة حالياً</div>`;
        return;
      }
      examsContainer.innerHTML = "";
      Object.entries(exams).forEach(([examId, exam]) => {
        const examCard = document.createElement("div");
        examCard.className = "exam-card";
        examCard.innerHTML = `
          <div class="exam-duration">⏱️ ${exam.duration_minutes ? exam.duration_minutes + ' دقيقة' : 'اختبار'}</div>
          <div class="exam-title">📋 ${exam.title}</div>
          <button class="start-exam-btn" data-id="${examId}">ابدأ الامتحان <i class="fas fa-arrow-left"></i></button>
        `;
        const btn = examCard.querySelector(".start-exam-btn");
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          localStorage.setItem("currentExamId", examId);
          window.location.href = `exam.html?id=${examId}`;
        });
        examsContainer.appendChild(examCard);
      });
    } catch (err) {
      console.error(err);
      examsContainer.innerHTML = `<div>⚠️ خطأ في تحميل الامتحانات</div>`;
    }
  }

  loadVideos();
  loadExams();

  // ===== الوضع الليلي / الفاتح =====
  const darkToggle = document.getElementById("darkToggle");
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light-mode");
    darkToggle.classList.add("active");
  }
  darkToggle.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");
    const isLight = document.body.classList.contains("light-mode");
    localStorage.setItem("theme", isLight ? "light" : "dark");
    darkToggle.classList.toggle("active", isLight);
  });

  // المشاركة و الواتساب
  const shareBtn = document.getElementById("shareBtn");
  const whatsappBtn = document.getElementById("whatsappShare");
  shareBtn.addEventListener("click", () => {
    if (navigator.share) navigator.share({ title: "منصة THE BEST", text: "شاهد الفيديوهات وحل الامتحانات", url: location.href });
    else showMessage("المشاركة غير مدعومة", true);
  });
  whatsappBtn.addEventListener("click", () => {
    window.open(`https://wa.me/?text=${encodeURIComponent(location.href)}`, "_blank");
  });

  // إشعارات تجريبية
  const notifyBtn = document.getElementById("notifyBtn");
  notifyBtn.addEventListener("click", () => showMessage("🔔 سيتم تفعيل الإشعارات قريباً"));

  // إخفاء التحميل الزائد (يمكن إضافة skeleton)
</script>
</body>
</html>
