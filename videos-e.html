<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>الفيديوهات والامتحانات - منصة THE BEST</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Cairo', sans-serif;
  background: #0d0d0d;
  color: #fff;
  margin: 0;
  padding: 15px;
}

/* ===== نفس التنسيقات بدون أي تعديل ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

header h1 {
  color: #ffd700;
  font-size: 1.8rem;
  margin: 0;
  font-weight: 900;
  text-align: center;
  flex-grow: 1;
}

#back {
  background: rgba(255, 215, 0, 0.1);
  border: 1.5px solid #ffd700;
  color: #ffd700;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.95rem;
  transition: 0.3s;
}

#back:hover {
  background: rgba(255, 215, 0, 0.2);
  transform: translateY(-2px);
}

h2 {
  color: #ffd700;
  margin: 15px 0;
  font-size: 1.5rem;
}

#videos-container,
#exams-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  max-width: 1100px;
  margin: auto;
}

/* ================= VIDEO ================= */
.video-box {
  background: #1a1a1a;
  border: 1px solid rgba(255, 215, 0, 0.15);
  border-radius: 12px;
  padding: 12px;
  transition: 0.3s;
  min-height: 250px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(255,215,0,0.05);
}

.video-box:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 18px rgba(255,215,0,0.25);
}

.video-title {
  font-size: 18px;
  font-weight: 800;
  color: #ffd700;
  text-align: center;
  margin-bottom: 8px;
}

.thumb {
  background: #000;
  border-radius: 10px;
  height: 160px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: relative;
}

.thumb::after {
  content: "▶";
  font-size: 40px;
  color: #ffd700;
}

/* ================= EXAMS ================= */
.exam-box {
  background: linear-gradient(180deg, #1a1a1a, #111);
  border: 1.5px solid rgba(255, 215, 0, 0.25);
  border-radius: 18px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  min-height: 180px;
}

.exam-duration {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,255,153,0.18);
  color: #00ff99;
  padding: 5px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 900;
}

.exam-title {
  font-size: 18px;
  font-weight: 900;
  color: #ffd700;
  text-align: center;
  margin-top: 30px;
}

.exam-box .btn {
  margin-top: auto;
  background: rgba(255,215,0,0.15);
  border: 2px solid #ffd700;
  color: #ffd700;
  padding: 10px;
  border-radius: 14px;
  cursor: pointer;
}

footer {
  text-align: center;
  color: #888;
  margin-top: 40px;
}
footer span {
  color: #ffd700;
}

#toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
}
.toast {
  background: rgba(0,0,0,0.8);
  color: #00ff99;
  padding: 12px 20px;
  border-radius: 12px;
}
.toast.error {
  color: #ff4c4c;
}
</style>
</head>

<body>

<header>
  <button id="back">⬅ رجوع</button>
  <h1>🎬 الفيديوهات والامتحانات</h1>
  <div style="width:35px"></div>
</header>

<div id="toast-container"></div>

<main>
  <h2>🎬 الفيديوهات</h2>
  <div id="videos-container">
    <div class="loading">⏳ جاري التحميل...</div>
  </div>
  <hr>
  <h2>📝 الامتحانات المتاحة</h2>
  <div id="exams-container">
    <div class="loading">⏳ جاري التحميل...</div>
  </div>
</main>

<footer>
  © جميع الحقوق محفوظة لمنصة <span>THE BEST</span>
</footer>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
  authDomain: "date-student.firebaseapp.com",
  databaseURL: "https://date-student-default-rtdb.firebaseio.com",
  projectId: "date-student",
  storageBucket: "date-student.firebasestorage.app",
  messagingSenderId: "952213529741",
  appId: "1:952213529741:web:7a8d8da275214b5754eec4",
  measurementId: "G-CNR9HYEGGF"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
/* ================================================= */

/* ===== كودك كما هو بدون أي تغيير ===== */
const videosContainer = document.getElementById("videos-container");
const examsContainer = document.getElementById("exams-container");
const backBtn = document.getElementById("back");

const selectedYear = JSON.parse(localStorage.getItem("selected_year"));
const selectedSubject = JSON.parse(localStorage.getItem("selected_subject"));
const selectedTeacher = JSON.parse(localStorage.getItem("selected_teacher"));
const selectedChapter = JSON.parse(localStorage.getItem("selected_chapter"));
const selectedLecture = JSON.parse(localStorage.getItem("selected_lecture"));

backBtn.onclick = () => window.location.href = 'lecture_name-e.html';

function logoutAndRedirect() {
  localStorage.clear();
  sessionStorage.clear();
  window.location.href = 'index.html';
}

async function safeFetch(url, options = {}) {
  const res = await fetch(url, { credentials: "include", ...options });
  if (res.status === 401) logoutAndRedirect();
  return res.ok ? res.json() : null;
}

function showToast(msg, type='success'){
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  t.innerText = msg;
  document.getElementById("toast-container").appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

async function loadVideos() {
  const data = await safeFetch(
    `/api/proxy1?type=videos&yearId=${selectedYear.id}&subjectId=${selectedSubject.id}&teacherId=${selectedTeacher.id}&chapterId=${selectedChapter.id}&lectureId=${selectedLecture.id}`
  );

  if (!data?.videos) return;

  videosContainer.innerHTML = "";
  data.videos.forEach((video,i)=>{
    const div=document.createElement("div");
    div.className="video-box";
    div.innerHTML=`
      <div class="video-title">فيديو ${i+1}: ${video.title||""}</div>
      <div class="thumb"></div>
    `;
    div.querySelector(".thumb").onclick=()=>{
      localStorage.setItem("video_sources",JSON.stringify([{src:video.stream_url,type:"application/x-mpegURL"}]));
      window.location.href='player.html';
    };
    videosContainer.appendChild(div);
  });
}

async function loadExams() {
  const data = await safeFetch(`/api/proxy?type=exams&lectureId=${selectedLecture.id}`);
  if (!data?.exams) return;

  examsContainer.innerHTML="";
  data.exams.forEach(exam=>{
    const div=document.createElement("div");
    div.className="exam-box";
    div.innerHTML=`
      <div class="exam-duration">⌛ ${exam.duration_minutes||""}</div>
      <div class="exam-title">${exam.title}</div>
      <button class="btn">ابدأ الامتحان</button>
    `;
    div.querySelector(".btn").onclick=()=>{
      localStorage.setItem("currentExamId",exam.id);
      location.href=`exam.html?id=${exam.id}`;
    };
    examsContainer.appendChild(div);
  });
}

loadVideos();
loadExams();
</script>

</body>
</html>
