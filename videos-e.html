<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>الفيديوهات والامتحانات - منصة THE BEST</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Cairo', sans-serif;
  background: #0d0d0d;
  color: #fff;
  margin: 0;
  padding: 15px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

header h1 {
  color: #ffd700;
  font-size: 1.8rem;
  margin: 0;
  font-weight: 900;
  text-align: center;
  flex-grow: 1;
}

#back {
  background: rgba(255, 215, 0, 0.1);
  border: 1.5px solid #ffd700;
  color: #ffd700;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.95rem;
  transition: 0.3s;
}

#back:hover {
  background: rgba(255, 215, 0, 0.2);
  transform: translateY(-2px);
}

h2 {
  color: #ffd700;
  margin: 15px 0;
  font-size: 1.5rem;
}

#videos-container,
#exams-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  max-width: 1100px;
  margin: auto;
}

/* ================= VIDEO ================= */
.video-box {
  background: #1a1a1a;
  border: 1px solid rgba(255, 215, 0, 0.15);
  border-radius: 12px;
  padding: 12px;
  transition: 0.3s;
  min-height: 250px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(255,215,0,0.05);
}

.video-box:hover {
  transform: translateY(-4px);
  box-shadow: 0 0 18px rgba(255,215,0,0.25);
}

.video-title {
  font-size: 18px;
  font-weight: 800;
  color: #ffd700;
  text-align: center;
  margin-bottom: 8px;
}

.thumb {
  background: #000;
  border-radius: 10px;
  height: 160px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  position: relative;
}

.thumb::after {
  content: "▶";
  font-size: 40px;
  color: #ffd700;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  transition: transform 0.3s ease;
}

.thumb:hover::after {
  transform: scale(1.1);
}

/* ================= EXAMS ================= */
.exam-box {
  background: linear-gradient(180deg, #1a1a1a, #111);
  border: 1.5px solid rgba(255, 215, 0, 0.25);
  border-radius: 18px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  overflow: hidden;
  transition: 0.35s ease;
  min-height: 180px;
}

.exam-box:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 25px rgba(255,215,0,0.35);
}

.exam-duration {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,255,153,0.18);
  color: #00ff99;
  padding: 5px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 900;
  border: 1px solid rgba(0,255,153,0.4);
  z-index: 2;
}

.exam-title {
  font-size: 18px;
  font-weight: 900;
  color: #ffd700;
  text-align: center;
  line-height: 1.4;
  margin-top: 30px;
}

.exam-box .btn {
  margin-top: auto;
  background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,215,0,0.08));
  border: 2px solid #ffd700;
  color: #ffd700;
  padding: 10px;
  border-radius: 14px;
  font-size: 0.95rem;
  font-weight: 900;
  cursor: pointer;
  transition: 0.3s;
}

.exam-box .btn:hover {
  background: #ffd700;
  color: #000;
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(255,215,0,0.45);
}

footer {
  text-align: center;
  color: #888;
  margin-top: 40px;
}
footer span {
  color: #ffd700;
}

/* ================= TOAST ================= */
#toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
}
.toast {
  background: rgba(0,0,0,0.8);
  color: #00ff99;
  padding: 12px 20px;
  border-radius: 12px;
  font-weight: bold;
}
.toast.error {
  color: #ff4c4c;
}
</style>
</head>
<body>

<header>
  <button id="back">⬅ رجوع</button>
  <h1>🎬 الفيديوهات والامتحانات</h1>
  <div style="width:35px"></div>
</header>

<div id="toast-container"></div>

<main>
  <h2>🎬 الفيديوهات</h2>
  <div id="videos-container">
    <div class="loading">⏳ جاري التحميل...</div>
  </div>
  <hr>
  <h2>📝 الامتحانات المتاحة</h2>
  <div id="exams-container">
    <div class="loading">⏳ جاري التحميل...</div>
  </div>
</main>

<footer>
  © جميع الحقوق محفوظة لمنصة <span>THE BEST</span>
</footer>

<script type="module">
const videosContainer = document.getElementById("videos-container");
const examsContainer = document.getElementById("exams-container");
const backBtn = document.getElementById("back");

// جلب البيانات من localStorage
const selectedYear = JSON.parse(localStorage.getItem("selected_year"));
const selectedSubject = JSON.parse(localStorage.getItem("selected_subject"));
const selectedTeacher = JSON.parse(localStorage.getItem("selected_teacher"));
const selectedChapter = JSON.parse(localStorage.getItem("selected_chapter"));
const selectedLecture = JSON.parse(localStorage.getItem("selected_lecture"));

// زر العودة
backBtn.onclick = () => window.location.href = 'lecture_name-e.html';

// ===== دالة الطرد الموحدة =====
function logoutAndRedirect() {
  localStorage.clear();
  sessionStorage.clear();
  window.location.href = 'index.html';
}

// ===== fetch آمنة تتحقق من انتهاء الجلسة =====
async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, { credentials: "include", ...options });

    if (res.status === 401) {
      logoutAndRedirect();
      return null;
    }

    if (!res.ok) throw new Error("❌ حدث خطأ أثناء جلب البيانات");
    return await res.json();
  } catch (err) {
    console.error(err);
    return null;
  }
}

// ===== إشعارات toast =====
function showToast(msg, type='success', duration=3500){
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.innerText = msg;
  container.appendChild(toast);
  setTimeout(()=>toast.remove(), duration);
}

// ===== تحميل الفيديوهات =====
async function loadVideos() {
  if (!selectedYear || !selectedSubject || !selectedTeacher || !selectedChapter || !selectedLecture) {
    showToast("⚠️ البيانات المطلوبة غير مكتملة", "error");
    return;
  }

  const data = await safeFetch(
    `/api/proxy1?type=videos&yearId=${selectedYear.id}&subjectId=${selectedSubject.id}&teacherId=${selectedTeacher.id}&chapterId=${selectedChapter.id}&lectureId=${selectedLecture.id}`
  );

  if (!data || !data.videos) {
    showToast("❌ حدث خطأ أثناء تحميل الفيديوهات", "error");
    return;
  }

  videosContainer.innerHTML = "";
  if (!data.videos.length) {
    showToast("⚠️ لا توجد فيديوهات لهذه المحاضرة", "error");
    return;
  }

  data.videos.forEach((video, index) => {
    const div = document.createElement("div");
    div.className = "video-box";

    const title = document.createElement("div");
    title.className = "video-title";
    title.textContent = `فيديو ${index + 1}: ${video.title || "بدون اسم"}`;

    const thumb = document.createElement("div");
    thumb.className = "thumb";
    thumb.onclick = () => {
      if (!video.stream_url) { showToast("⚠️ لا يوجد رابط لهذا الفيديو", "error"); return; }
      localStorage.setItem("video_sources", JSON.stringify([{ src: video.stream_url, type: "application/x-mpegURL" }]));
      localStorage.setItem("video_title", video.title || `فيديو`);
      window.location.href = 'player.html';
    };

    div.append(title, thumb);
    videosContainer.appendChild(div);
  });
}

// ===== تحميل الامتحانات =====
async function loadExams() {
  if (!selectedLecture) { showToast("⚠️ لم يتم تحديد المحاضرة", "error"); return; }

  const data = await safeFetch(`/api/proxy?type=exams&lectureId=${selectedLecture.id}`);
  if (!data || !data.exams) {
    showToast("❌ فشل تحميل الامتحانات", "error");
    return;
  }

  examsContainer.innerHTML = "";
  if (!data.exams.length) {
    showToast("⚠️ لا توجد امتحانات لهذه المحاضرة", "error");
    return;
  }

  data.exams.forEach((exam) => {
    const div = document.createElement("div");
    div.className = "exam-box";

    const duration = document.createElement("div");
    duration.className = "exam-duration";
    duration.textContent = exam.duration_minutes ? `⌛ ${exam.duration_minutes} دقيقة` : "اختبار شامل";

    const title = document.createElement("div");
    title.className = "exam-title";
    title.textContent = exam.title || "بدون اسم";

    const startBtn = document.createElement("button");
    startBtn.className = "btn";
    startBtn.textContent = "ابدأ الامتحان";
    startBtn.onclick = () => {
      localStorage.setItem("currentExamId", exam.id);
      window.location.href = `exam.html?id=${exam.id}`;
    };

    div.append(duration, title, startBtn);
    examsContainer.appendChild(div);
  });
}

// تشغيل التحميل
loadVideos();
loadExams();
</script>


</body>
</html>
