<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>المواد - منصة THE BEST</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo&display=swap');

/* ========== نفس CSS بتاعك بدون أي تغيير ========== */
body {
  font-family: 'Cairo', sans-serif;
  background: #121212;
  color: #fff;
  padding: 80px 15px 30px;
  margin: 0;
  transition: background 0.3s, color 0.3s;
}
.topbar {
  display:flex;align-items:center;justify-content:space-between;
  background:#111;padding:10px 15px;position:fixed;
  top:0;left:0;right:0;z-index:1000
}
.menu-btn{font-size:22px;cursor:pointer}
.title{font-size:14px;color:#f36}
.icons{display:flex;gap:12px}
.icons img{width:22px;cursor:pointer}
h1{text-align:center;color:#ffd700;margin-bottom:40px}
ul{
  list-style:none;padding:0;max-width:900px;margin:auto;
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:30px
}
li{
  background:#1e1e1e;border-radius:16px;padding:20px 15px 30px;
  cursor:pointer;text-align:center
}
.circle{
  width:100px;height:100px;border-radius:50%;
  background:#333;margin:0 auto 15px;
  display:flex;align-items:center;justify-content:center
}
.circle img{width:80%;height:80%}
li.loading{
  grid-column:1/-1;background:none;color:#aaa;text-align:center
}
.profile-float-btn{
  position:fixed;bottom:20px;left:20px;width:55px;height:55px;
  border-radius:50%;background:#222;border:2px solid #ffd700;
  display:flex;align-items:center;justify-content:center
}
.profile-float-btn img{width:28px}
</style>
</head>

<body>

<div class="topbar">
  <div class="menu-btn">☰</div>
  <div class="title">𝑷𝒍𝒂𝒕𝒇𝒐𝒓𝒎 𝑻𝒉𝒆 𝑩𝒆𝒔𝒕 𝟐𝟎𝟐𝟔</div>
  <div class="icons">
    <div class="toggle-dark"></div>
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
    <img src="https://cdn-icons-png.flaticon.com/512/929/929610.png">
    <img src="https://cdn-icons-png.flaticon.com/512/1827/1827272.png">
  </div>
</div>

<h1>𝑺𝒖𝒃𝒋𝒆𝒄𝒕𝒔 𝒄𝒍𝒂𝒔𝒔 𝒐𝒇 𝟐𝟎𝟐𝟔</h1>

<ul id="subjects-list">
  <li class="loading">⏳ Loading...</li>
</ul>

<a href="profile.html" class="profile-float-btn">
  <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
</a>

<!-- ================= Firebase ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 Firebase Config (بتاعك) */
const firebaseConfig = {
  apiKey: "AIzaSyAFrf9kRQez8ltkvd66_BQZPmARc1fW6y8",
  authDomain: "date-student.firebaseapp.com",
  databaseURL: "https://date-student-default-rtdb.firebaseio.com",
  projectId: "date-student",
  storageBucket: "date-student.firebasestorage.app",
  messagingSenderId: "952213529741",
  appId: "1:952213529741:web:7a8d8da275214b5754eec4",
  measurementId: "G-CNR9HYEGGF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const subjectImages = {
  "أحياء":"https://www2.0zz0.com/2025/11/03/16/425588580.jpg",
  "فيزياء":"https://www2.0zz0.com/2025/11/03/16/155373686.jpg",
  "كيمياء":"https://www2.0zz0.com/2025/11/03/16/286845048.jpg"
};

const list = document.getElementById("subjects-list");
const selectedYear = JSON.parse(localStorage.getItem("selected_year"));

onAuthStateChanged(auth, user => {
  if(!user){
    localStorage.clear();
    location.href="index.html";
    return;
  }
  if(!selectedYear){
    list.innerHTML='<li class="loading">❌ لم يتم اختيار سنة</li>';
    return;
  }
  loadSubjects(selectedYear.id);
});

async function loadSubjects(yearId){
  list.innerHTML='<li class="loading">⏳ Loading...</li>';
  const snap = await getDocs(collection(db,"years",yearId,"subjects"));
  list.innerHTML="";
  if(snap.empty){
    list.innerHTML='<li class="loading">❌ لا توجد مواد</li>';
    return;
  }
  snap.forEach(doc=>{
    const s=doc.data();
    const li=document.createElement("li");
    li.innerHTML=`
      <div class="circle">
        <img src="${subjectImages[s.name]||'https://img.icons8.com/ios-filled/100/ffd700/book.png'}">
      </div>
      <span>${s.name}</span>
      <div style="color:#ffd700;font-size:.9rem">${s.teachers_count||0} Teacher</div>
    `;
    li.onclick=()=>{
      localStorage.setItem("selected_subject",JSON.stringify({...s,id:doc.id}));
      location.href="teachers-e.html";
    };
    list.appendChild(li);
  });
}
</script>

</body>
</html>
